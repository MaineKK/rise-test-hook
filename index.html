        function loadModule(manifest) {
          const p = []

          if (manifest['.css'] != null) {
            for (var idx = 0; idx < manifest['.css'].length; idx++) {
              p.push(new Promise((resolve, reject) => {
                var link = document.createElement('link')
                link.onload = resolve
                link.onerror = reject
                link.rel = 'stylesheet'
                link.href = 'lib/' + manifest['.css'][idx]
                document.body.appendChild(link)
              }))
            }

                script.onload = resolve
                script.onerror = reject
                script.src = 'lib/' + manifest['.js'][idx]
                document.body.appendChild(script)
              }))
            }
          }

          return Promise.all(p)
        }

          const result = JSON.parse(json)

    <script type="text/javascript">
  (function(root) {
    window.partnerContent = [];

    function isExport() {
      return true;
    }

    function resolvePath(path) {
      return ('assets/').concat(path);
    }

    function resolveFontPath(font) {
      return ('lib/fonts/').concat(font.key.split('/').reverse()[0]);
    }

    root.Runtime = {
      fetch: window.__fetchCourse,
      isExport: isExport,
      resolvePath: resolvePath,
      resolveFontPath: resolveFontPath
    };
  }(window));

    <!-- Hook para detectar el último Continuar/Finalizar de Rise y desbloquear Next en Storyline -->
  <script>
(function () {
function unlockNext() {
 try { window.parent.postMessage({ type: 'UNLOCK_NEXT' }, '*'); } catch (e) {}
 }
function isLastVisibleContinue(btn) {
 const visibles = Array.from(document.querySelectorAll('button.continue-btn[data-continuebtn]'))
 .filter(b => b.offsetParent !== null);
 return visibles.length > 0 && visibles[visibles.length - 1] === btn;
 }
 // Handler de click
 function onContinueClick(e) {
 const btn = e.currentTarget;
 const label = (btn.textContent || '').trim().toLowerCase();
 const looksFinal =
 /finaliz/.test(label) // “Finalizar”, “Finaliza”, etc.
 || isLastVisibleContinue(btn); // o es el último Continuar visible
 if (looksFinal) {
 setTimeout(unlockNext, 200);
 }
 }
function wireButtons(root = document) {
 const candidates = root.querySelectorAll('button.continue-btn[data-continue-btn]');
 candidates.forEach(btn => {
 if (btn.__wired) return;
 btn.__wired = true;
 btn.addEventListener('click', onContinueClick);
 });
 }
 // Inicial
 wireButtons();
const mo = new MutationObserver(muts => {
 for (const m of muts) {
 if (!m.addedNodes) continue;
 m.addedNodes.forEach(n => {
 if (n.nodeType !== 1) return;
 if (n.matches?.('button.continue-btn[data-continue-btn]')) wireButtons(n);
 else wireButtons(n);
 });
 }
 });
 mo.observe(document.documentElement, { childList: true, subtree: true });
})();
